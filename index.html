<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPI漢字 語句の意味クイズ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 680px;
    width: 100%;
    padding: 32px;
  }
  .screen[hidden] { display: none; }
  h1 { font-size: 22px; color: #333; margin-bottom: 8px; }
  h2 { font-size: 17px; color: #444; margin-bottom: 12px; }
  .subtitle { color: #777; font-size: 14px; margin-bottom: 24px; }

  /* Start screen */
  .setting { margin-bottom: 24px; }
  .setting label { display: block; font-size: 14px; color: #555; margin-bottom: 10px; font-weight: 600; }
  .count-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 8px;
  }
  .count-options button {
    padding: 14px;
    background: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .count-options button:hover { border-color: #667eea; }
  .count-options button.active {
    background: #667eea;
    border-color: #667eea;
    color: white;
  }
  .dataset-info {
    background: #f8f9ff;
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    color: #667;
    margin-bottom: 20px;
  }

  /* Quiz header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    padding-bottom: 14px;
    border-bottom: 2px solid #f0f0f0;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    color: #555;
    margin-bottom: 10px;
  }
  .progress-info strong { color: #667eea; font-size: 16px; }

  /* History squares */
  .history {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 18px;
    padding: 8px;
    background: #f8f9ff;
    border-radius: 8px;
    min-height: 28px;
  }
  .history .cell {
    width: 16px;
    height: 16px;
    background: #e0e0e0;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .history .cell.ok { background: #28a745; }
  .history .cell.ng { background: #dc3545; }
  .history .cell.current {
    background: #667eea;
    transform: scale(1.25);
    box-shadow: 0 0 0 2px rgba(102,126,234,0.3);
  }
  .history.large .cell { width: 20px; height: 20px; }

  /* Question */
  .question-area {
    background: #f8f9ff;
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 20px;
  }
  .prompt { font-size: 13px; color: #888; margin-bottom: 12px; }
  .word {
    font-size: 52px;
    font-weight: 700;
    color: #333;
    letter-spacing: 4px;
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .reading {
    font-size: 15px;
    color: #999;
    visibility: hidden;
  }
  .reading.show { visibility: visible; }

  .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .choice {
    padding: 14px 18px;
    background: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .choice:hover:not(:disabled) {
    border-color: #667eea;
    background: #f8f9ff;
    transform: translateX(4px);
  }
  .choice:disabled { cursor: default; }
  .choice.correct {
    background: #d4edda;
    border-color: #28a745;
    color: #155724;
  }
  .choice.wrong {
    background: #f8d7da;
    border-color: #dc3545;
    color: #721c24;
  }
  .choice .label {
    display: inline-block;
    width: 22px;
    height: 22px;
    line-height: 22px;
    text-align: center;
    background: #667eea;
    color: white;
    border-radius: 50%;
    margin-right: 10px;
    font-size: 12px;
  }
  .choice.correct .label { background: #28a745; }
  .choice.wrong .label { background: #dc3545; }

  .feedback {
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 14px;
    font-size: 14px;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: #d4edda; color: #155724; }
  .feedback.ng { background: #f8d7da; color: #721c24; }

  .hint-box {
    display: none;
    padding: 10px 14px;
    margin-bottom: 14px;
    background: #fffbea;
    border-left: 3px solid #f5a623;
    border-radius: 6px;
    font-size: 13px;
    color: #7a5a15;
    line-height: 1.5;
  }
  .hint-box.show { display: block; }
  .hint-box .label {
    font-weight: 600;
    margin-right: 6px;
    color: #c48410;
  }

  .controls { display: flex; gap: 10px; }
  button.primary {
    flex: 1;
    padding: 13px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  button.primary:hover { background: #5568d3; }
  button.primary:disabled { background: #ccc; cursor: not-allowed; }
  button.secondary {
    padding: 13px 18px;
    background: #fff;
    color: #667eea;
    border: 2px solid #667eea;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  button.secondary:hover { background: #f0f3ff; }
  button.ghost {
    padding: 8px 14px;
    background: transparent;
    color: #999;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
  }
  button.ghost:hover { background: #f8f8f8; color: #666; }

  /* SRS dashboard */
  .dashboard {
    background: #f8f9ff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .dash-title {
    font-size: 13px;
    color: #667;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .dash-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .dash-cell {
    background: #fff;
    padding: 10px 8px;
    border-radius: 8px;
    text-align: center;
  }
  .dash-num { font-size: 20px; font-weight: 700; color: #333; }
  .dash-num.due { color: #e67e22; }
  .dash-num.new { color: #667eea; }
  .dash-num.mastered { color: #28a745; }
  .dash-label { font-size: 11px; color: #888; margin-top: 2px; }

  .level-bars { display: flex; gap: 3px; height: 24px; margin-top: 8px; border-radius: 6px; overflow: hidden; background: #e5e5e5; }
  .level-bar {
    position: relative;
    transition: flex 0.3s;
  }
  .level-bar[data-lvl="0"] { background: #ddd; }
  .level-bar[data-lvl="1"] { background: #f9c784; }
  .level-bar[data-lvl="2"] { background: #f5a65b; }
  .level-bar[data-lvl="3"] { background: #88c999; }
  .level-bar[data-lvl="4"] { background: #5cb85c; }
  .level-bar[data-lvl="5"] { background: #3d9970; }
  .level-bar[data-lvl="6"] { background: #2c5f2d; }
  .level-legend {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: #999;
    margin-top: 4px;
  }

  /* Mode selector */
  .mode-options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .mode-options button {
    padding: 12px;
    background: #fff;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: all 0.15s;
  }
  .mode-options button:hover:not(:disabled) { border-color: #667eea; }
  .mode-options button:disabled { opacity: 0.4; cursor: not-allowed; }
  .mode-options button.active {
    background: #667eea;
    border-color: #667eea;
    color: white;
  }
  .mode-options button.active .mode-sub { color: rgba(255,255,255,0.8); }
  .mode-title { font-size: 14px; font-weight: 600; }
  .mode-sub { font-size: 11px; color: #888; margin-top: 2px; }

  /* Timer bar */
  .timer-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .timer-bar-bg {
    flex: 1;
    height: 8px;
    background: #eee;
    border-radius: 4px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    width: 100%;
    background: #28a745;
    border-radius: 4px;
  }
  .timer-bar.warn { background: #ffc107; }
  .timer-bar.danger { background: #dc3545; }
  .timer-text {
    font-size: 13px;
    color: #666;
    font-variant-numeric: tabular-nums;
    min-width: 36px;
    text-align: right;
    font-weight: 600;
  }
  .timer-text.danger { color: #dc3545; }

  /* SRS pill in quiz */
  .srs-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    margin-left: 6px;
    background: #eef;
    color: #559;
  }
  .srs-pill.new { background: #e7ecff; color: #667eea; }
  .srs-pill.lv { background: #f0f8f0; color: #3d9970; }
  .next-review {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
  }

  /* Result screen */
  .final-score {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 28px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 20px;
  }
  .score-big { font-size: 48px; font-weight: 700; margin-bottom: 4px; }
  .score-rate { font-size: 16px; opacity: 0.9; }
  .score-label { font-size: 13px; opacity: 0.8; margin-bottom: 6px; }

  .review { margin-top: 20px; }
  .review ul { list-style: none; max-height: 280px; overflow-y: auto; }
  .review li {
    padding: 10px 12px;
    background: #fff5f5;
    border-left: 3px solid #dc3545;
    border-radius: 4px;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .review li .rw { font-weight: 600; color: #333; }
  .review li .rr { color: #888; font-size: 12px; margin-left: 6px; }
  .review li .rm { color: #555; margin-top: 2px; }
  .review li .rpick { color: #b54; font-size: 12px; margin-top: 2px; }
  .review .allgood {
    padding: 16px;
    background: #d4edda;
    color: #155724;
    border-radius: 8px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Start Screen -->
  <div id="startScreen" class="screen">
    <h1>SPI漢字 語句の意味クイズ</h1>
    <p class="subtitle">忘却曲線に沿った復習システム搭載（4択クイズ）</p>

    <div class="dashboard">
      <div class="dash-title">
        <span>学習進捗</span>
        <button class="ghost" id="resetBtn" style="padding:4px 10px; font-size:11px">履歴リセット</button>
      </div>
      <div class="dash-stats">
        <div class="dash-cell"><div class="dash-num" id="statTotal">0</div><div class="dash-label">総語数</div></div>
        <div class="dash-cell"><div class="dash-num due" id="statDue">0</div><div class="dash-label">本日復習</div></div>
        <div class="dash-cell"><div class="dash-num new" id="statNew">0</div><div class="dash-label">未学習</div></div>
        <div class="dash-cell"><div class="dash-num mastered" id="statMastered">0</div><div class="dash-label">習熟済み</div></div>
      </div>
      <div class="level-bars" id="levelBars"></div>
      <div class="level-legend"><span>未学習</span><span>Lv.1(1日)</span><span>Lv.3(7日)</span><span>Lv.5(30日)</span><span>習熟</span></div>
    </div>

    <div class="setting">
      <label>出題モード</label>
      <div class="mode-options" id="modeOptions">
        <button data-mode="srs" class="active">
          <div class="mode-title">復習モード</div>
          <div class="mode-sub">期日の来た語＋新出を優先出題</div>
        </button>
        <button data-mode="new">
          <div class="mode-title">新出のみ</div>
          <div class="mode-sub">未学習の語だけ出題</div>
        </button>
        <button data-mode="weak">
          <div class="mode-title">苦手モード</div>
          <div class="mode-sub">間違えた回数が多い順</div>
        </button>
        <button data-mode="random">
          <div class="mode-title">ランダム</div>
          <div class="mode-sub">履歴を無視してランダム</div>
        </button>
      </div>
    </div>

    <div class="setting">
      <label>問題数</label>
      <div class="count-options" id="countOptions">
        <button data-count="10">10問</button>
        <button data-count="20" class="active">20問</button>
        <button data-count="30">30問</button>
        <button data-count="50">50問</button>
        <button data-count="100">100問</button>
        <button data-count="all">全問</button>
      </div>
    </div>

    <div class="setting">
      <label>制限時間</label>
      <div class="count-options" id="timerOptions">
        <button data-sec="0">無制限</button>
        <button data-sec="5">5秒</button>
        <button data-sec="10" class="active">10秒</button>
        <button data-sec="20">20秒</button>
        <button data-sec="30">30秒</button>
      </div>
    </div>

    <div class="dataset-info" id="dsInfo"></div>
    <button class="primary" id="startBtn">スタート →</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quizScreen" class="screen" hidden>
    <header>
      <h1>クイズ</h1>
      <button class="ghost" id="quitBtn">中止</button>
    </header>
    <div class="progress-info">
      <span>Q <strong id="currentNum">1</strong> / <span id="totalNum">10</span></span>
      <span>正解 <strong id="correctNum">0</strong> / 不正解 <strong id="wrongNum" style="color:#dc3545">0</strong></span>
    </div>
    <div class="history" id="history"></div>

    <div class="timer-wrap" id="timerWrap" hidden>
      <div class="timer-bar-bg"><div class="timer-bar" id="timerBar"></div></div>
      <div class="timer-text" id="timerText">10</div>
    </div>

    <div class="question-area">
      <div class="prompt">次の語句の意味として最も適切なものを選びなさい <span id="srsPill" class="srs-pill"></span></div>
      <div class="word" id="word">―</div>
      <div class="reading" id="reading">―</div>
      <div class="next-review" id="nextReview"></div>
    </div>

    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <div class="hint-box" id="hintBox"><span class="label">覚え方</span><span id="hintText"></span></div>

    <div class="controls">
      <button class="secondary" id="readingBtn">読み方</button>
      <button class="primary" id="nextBtn" disabled>次の問題 →</button>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="resultScreen" class="screen" hidden>
    <h1>結果</h1>
    <div class="final-score">
      <div class="score-label">正答数</div>
      <div class="score-big"><span id="finalCorrect">0</span> / <span id="finalTotal">0</span></div>
      <div class="score-rate">正答率 <span id="finalRate">0</span>%</div>
    </div>
    <div class="history large" id="resultHistory"></div>
    <div class="review">
      <h2>間違えた問題の復習</h2>
      <div id="reviewArea"></div>
    </div>
    <div class="controls" style="margin-top:20px">
      <button class="secondary" id="backBtn">最初に戻る</button>
      <button class="primary" id="retryBtn">同じ設定でもう一度 →</button>
    </div>
  </div>

</div>

<script>
const DATA = [
  // ==== 原典SPI問題集（126問ベース）====
  {w:"卒読",r:"そつどく",m:"ひととおり読む"},

const seen = new Set();

  const k = d.w + "|" + d.r;

  seen.add(k);
  return true;
});

// ==== SRS (Spaced Repetition System) ====
// 忘却曲線に基づくレベル別復習間隔（日数）
const SRS_KEY = "spi_srs_v1";
const INTERVALS_DAYS = [0, 1, 3, 7, 14, 30, 90];
const MAX_LEVEL = 6;
const DAY_MS = 86400000;

function loadSRS() {
  try { return JSON.parse(localStorage.getItem(SRS_KEY)) || {}; }
  catch { return {}; }
}
function saveSRS(s) { localStorage.setItem(SRS_KEY, JSON.stringify(s)); }
function keyOf(d) { return d.w + "|" + d.r; }
function getRec(srs, d) {
  return srs[keyOf(d)] || null;
}
function updateRec(srs, d, isCorrect) {
  const cur = srs[keyOf(d)] || { level: 0, nextDue: 0, lastSeen: 0, correct: 0, wrong: 0 };
  const now = Date.now();
  if (isCorrect) {
    cur.level = Math.min(cur.level + 1, MAX_LEVEL);
    cur.correct++;
  } else {
    cur.level = Math.max(cur.level - 1, 0);
    cur.wrong++;
  }
  cur.lastSeen = now;
  cur.nextDue = now + INTERVALS_DAYS[cur.level] * DAY_MS;
  srs[keyOf(d)] = cur;
  saveSRS(srs);
  return cur;
}
function nextIntervalLabel(level) {
  const d = INTERVALS_DAYS[level];
  if (d === 0) return "今すぐ";
  if (d < 7) return `${d}日後`;
  if (d < 30) return `${d}日後（${Math.round(d/7)}週間）`;
  return `${d}日後（約${Math.round(d/30)}ヶ月）`;
}

function computeStats(srs) {
  const now = Date.now();
  const stats = { total: UNIQUE_DATA.length, learned: 0, due: 0, unlearned: 0, mastered: 0, byLevel: [0,0,0,0,0,0,0] };
  UNIQUE_DATA.forEach(d => {
    const r = srs[keyOf(d)];
    if (!r) { stats.unlearned++; stats.byLevel[0]++; return; }
    stats.learned++;
    stats.byLevel[r.level]++;
    if (r.nextDue <= now) stats.due++;
    if (r.level >= 5) stats.mastered++;
  });
  return stats;
}

// Quiz state
let state = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickQuestionQueue(mode, count) {
  const srs = loadSRS();
  const now = Date.now();
  const withMeta = UNIQUE_DATA.map(d => ({ d, r: srs[keyOf(d)] }));

  let pool;
  if (mode === "srs") {
    // 期日の来た語 → 未学習 → 残り
    const due = withMeta.filter(x => x.r && x.r.nextDue <= now).map(x => x.d);
    const newOnes = withMeta.filter(x => !x.r).map(x => x.d);
    const rest = withMeta.filter(x => x.r && x.r.nextDue > now).map(x => x.d);
    pool = [...shuffle(due), ...shuffle(newOnes), ...shuffle(rest)];
  } else if (mode === "new") {
    pool = shuffle(withMeta.filter(x => !x.r).map(x => x.d));
    if (pool.length === 0) {
      alert("新出の語がありません。別モードをお試しください。");
      return null;
    }
  } else if (mode === "weak") {
    const scored = withMeta
      .filter(x => x.r && x.r.wrong > 0)
      .sort((a,b) => b.r.wrong - a.r.wrong);
    if (scored.length === 0) {
      alert("間違えた履歴がありません。他モードで学習後にお試しください。");
      return null;
    }
    pool = scored.map(x => x.d);
  } else {
    pool = shuffle(UNIQUE_DATA);
  }

  return pool.slice(0, Math.min(count, pool.length));
}

function startQuiz(count) {
  const queue = pickQuestionQueue(selectedMode, count);
  if (!queue || queue.length === 0) return;
  state = {
    total: queue.length,
    queue,
    idx: 0,
    correct: 0,
    wrong: 0,
    history: [],
    wrongList: [],
    timerSec: selectedSec
  };
  renderHistoryCells();
  $("totalNum").textContent = queue.length;
  $("timerWrap").hidden = (selectedSec === 0);
  show("quiz");
  renderQuestion();
}

// Timer
let timerTimeout = null;
let timerInterval = null;

function stopTimer() {
  if (timerTimeout) { clearTimeout(timerTimeout); timerTimeout = null; }
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function startTimer(seconds) {
  stopTimer();
  if (seconds <= 0) return;
  const totalMs = seconds * 1000;
  const startT = Date.now();
  const $bar = $("timerBar");
  const $text = $("timerText");
  $bar.classList.remove("warn", "danger");
  $text.classList.remove("danger");
  // reset width instantly
  $bar.style.transition = "none";
  $bar.style.width = "100%";
  $text.textContent = seconds;
  void $bar.offsetWidth; // reflow
  $bar.style.transition = `width ${seconds}s linear`;
  $bar.style.width = "0%";

  timerInterval = setInterval(() => {
    const elapsed = Date.now() - startT;
    const remainMs = Math.max(0, totalMs - elapsed);
    const ratio = remainMs / totalMs;
    $text.textContent = Math.ceil(remainMs / 1000);
    if (ratio < 0.33) { $bar.classList.add("danger"); $bar.classList.remove("warn"); $text.classList.add("danger"); }
    else if (ratio < 0.66) { $bar.classList.add("warn"); }
  }, 100);

  timerTimeout = setTimeout(() => {
    stopTimer();
    handleTimeout();
  }, totalMs);
}

function handleTimeout() {
  const buttons = [...$("choices").querySelectorAll(".choice")];
  if (buttons.length === 0 || buttons[0].disabled) return;
  buttons.forEach((b, i) => {
    b.disabled = true;
    if (state.options[i].m === state.current.m) b.classList.add("correct");
  });
  // 不正解扱いでSRS更新
  const srs = loadSRS();
  const updated = updateRec(srs, state.current, false);
  state.wrong++;
  state.history.push("ng");
  state.wrongList.push({
    w: state.current.w,
    r: state.current.r,
    m: state.current.m,
    picked: "（時間切れ）"
  });
  $("feedback").classList.add("show", "ng");
  $("feedback").textContent = `時間切れ. 「${state.current.w}」(${state.current.r}) の意味は「${state.current.m}」`;
  $("nextReview").textContent = `Lv.${updated.level} → 次回復習: ${nextIntervalLabel(updated.level)}`;
  $("reading").classList.add("show");
  $("correctNum").textContent = state.correct;
  $("wrongNum").textContent = state.wrong;
  $("nextBtn").disabled = false;
  revealHint(state.current);
  renderHistoryCells();
}

function renderHistoryCells() {
  const $hist = $("history");
  $hist.innerHTML = "";
  for (let i = 0; i < state.total; i++) {
    const c = document.createElement("div");
    c.className = "cell";
    if (state.history[i] === "ok") c.classList.add("ok");
    else if (state.history[i] === "ng") c.classList.add("ng");
    if (i === state.idx) c.classList.add("current");
    $hist.appendChild(c);
  }
}

function renderQuestion() {
  const q = state.queue[state.idx];
  state.current = q;
  $("word").textContent = q.w;
  $("reading").textContent = q.r;
  $("reading").classList.remove("show");
  $("currentNum").textContent = state.idx + 1;
  $("correctNum").textContent = state.correct;
  $("wrongNum").textContent = state.wrong;

  // SRSレベル表示
  const srs = loadSRS();
  const rec = getRec(srs, q);
  const $pill = $("srsPill");
  if (!rec) {
    $pill.textContent = "新出";
    $pill.className = "srs-pill new";
  } else {
    $pill.textContent = `Lv.${rec.level}`;
    $pill.className = "srs-pill lv";
  }
  $("nextReview").textContent = "";

  // Distractors
  const pool = UNIQUE_DATA.filter(d => d.m !== q.m);
  const distractors = shuffle(pool).slice(0, 3);
  const options = shuffle([q, ...distractors]);
  state.options = options;

  const $choices = $("choices");
  $choices.innerHTML = "";
  options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = `<span class="label">${String.fromCharCode(65 + i)}</span>${opt.m}`;
    btn.addEventListener("click", () => handleAnswer(btn, opt));
    $choices.appendChild(btn);
  });

  $("feedback").classList.remove("show", "ok", "ng");
  $("feedback").textContent = "";
  $("hintBox").classList.remove("show");
  $("nextBtn").disabled = true;
  $("nextBtn").textContent = (state.idx === state.total - 1) ? "結果を見る →" : "次の問題 →";
  renderHistoryCells();
  startTimer(state.timerSec);
}

function revealHint(d) {
  const h = getHint(d);
  if (h) {
    $("hintText").textContent = h;
    $("hintBox").classList.add("show");
  } else {
    $("hintBox").classList.remove("show");
  }
}

function handleAnswer(btn, chosen) {
  stopTimer();
  const buttons = [...$("choices").querySelectorAll(".choice")];
  buttons.forEach((b, i) => {
    b.disabled = true;
    if (state.options[i].m === state.current.m) b.classList.add("correct");
  });

  const isCorrect = chosen.m === state.current.m;

  // SRS更新
  const srs = loadSRS();
  const updated = updateRec(srs, state.current, isCorrect);

  if (isCorrect) {
    state.correct++;
    state.history.push("ok");
    $("feedback").classList.add("show", "ok");
    $("feedback").textContent = `正解! 「${state.current.w}」(${state.current.r}) — ${state.current.m}`;
  } else {
    state.wrong++;
    state.history.push("ng");
    state.wrongList.push({
      w: state.current.w,
      r: state.current.r,
      m: state.current.m,
      picked: chosen.m
    });
    btn.classList.add("wrong");
    $("feedback").classList.add("show", "ng");
    $("feedback").textContent = `不正解. 「${state.current.w}」(${state.current.r}) の意味は「${state.current.m}」`;
  }

  $("nextReview").textContent = `Lv.${updated.level} → 次回復習: ${nextIntervalLabel(updated.level)}`;
  $("reading").classList.add("show");
  $("correctNum").textContent = state.correct;
  $("wrongNum").textContent = state.wrong;
  $("nextBtn").disabled = false;
  revealHint(state.current);
  renderHistoryCells();
}

function nextOrFinish() {
  stopTimer();
  state.idx++;
  if (state.idx >= state.total) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  $("finalCorrect").textContent = state.correct;
  $("finalTotal").textContent = state.total;
  $("finalRate").textContent = Math.round(100 * state.correct / state.total);

  const $rh = $("resultHistory");
  $rh.innerHTML = "";
  state.history.forEach(h => {
    const c = document.createElement("div");
    c.className = "cell " + h;
    $rh.appendChild(c);
  });

  const $review = $("reviewArea");
  $review.innerHTML = "";
  if (state.wrongList.length === 0) {
    $review.innerHTML = '<div class="allgood">全問正解! 素晴らしい</div>';
  } else {
    const ul = document.createElement("ul");
    state.wrongList.forEach(w => {
      const li = document.createElement("li");
      const hint = HINTS[w.w + "|" + w.r];
      const hintHtml = hint ? `<div class="rm" style="color:#c48410;margin-top:4px">💡 ${hint}</div>` : "";
      li.innerHTML = `
        <span class="rw">${w.w}</span><span class="rr">(${w.r})</span>
        <div class="rm">正: ${w.m}</div>
        <div class="rpick">あなたの回答: ${w.picked}</div>
        ${hintHtml}
      `;
      ul.appendChild(li);
    });
    $review.appendChild(ul);
  }
  show("result");
}

// Event bindings
$("startBtn").addEventListener("click", () => startQuiz(selectedCount));
$("nextBtn").addEventListener("click", nextOrFinish);
$("readingBtn").addEventListener("click", () => {
  $("reading").classList.toggle("show");
});
$("quitBtn").addEventListener("click", () => {
  if (confirm("クイズを中止して最初に戻りますか?")) { stopTimer(); renderDashboard(); show("start"); }
});
$("retryBtn").addEventListener("click", () => startQuiz(state.total));
$("backBtn").addEventListener("click", () => { renderDashboard(); show("start"); });
</script>
</body>
</html>
